name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  #  Test — run pytest on all supported Python versions
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          APP_ENV: demo
          DSN: sqlite:///test_scalper.db
          USE_BNB_FEE: true
          ENCRYPTION_KEY: test-encryption-key-for-ci
        run: |
          python -m pytest tests/ -v --tb=short --asyncio-mode=auto --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml

  # ──────────────────────────────────────────────
  #  Lint — code quality checks
  # ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linter
        run: pip install flake8 pyright

      - name: Run flake8
        run: |
          flake8 . --max-line-length=120 --extend-ignore=E203,W503 --exclude=venv,__pycache__,.git --per-file-ignores="__init__.py:F401"

      - name: Run pyright (type check)
        continue-on-error: true
        run: |
          pyright --pythonversion 3.12 . || true

  # ──────────────────────────────────────────────
  #  Build — verify the project builds cleanly
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify syntax
        run: |
          python -c "
          import ast, sys
          files = ['core/config.py', 'core/models.py', 'core/exceptions.py', 'core/logging_setup.py',
                   'strategy/engine.py', 'strategy/indicators.py',
                   'execution/engine.py', 'risk/manager.py', 'risk/enhanced_manager.py',
                   'main.py', 'backtesting/engine.py', 'backtesting/metrics.py',
                   'analytics/scoring.py', 'analytics/performance.py',
                   'notifications/alerts.py', 'monitoring/health.py', 'monitoring/watchdog.py']
          for f in files:
              try:
                  ast.parse(open(f).read())
                  print(f'✅ {f}')
              except Exception as e:
                  print(f'❌ {f}: {e}')
                  sys.exit(1)
          "

      - name: Verify imports
        run: |
          python -c "from core.config import APP, RISK, STRATEGY; print('✅ Core imports OK')"
          python -c "from core.models import Base, Trade, BotLog; print('✅ Models import OK')"
          python -c "from core.exceptions import ScalperError; print('✅ Exceptions import OK')"

  # ──────────────────────────────────────────────
  #  Security — check for secrets and vulnerabilities
  # ──────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          if grep -r "ghp_\|api_secret.*=.*['\"]" --include="*.py" --exclude-dir=venv .; then
            echo "❌ Hardcoded secrets found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Check .env is not committed
        run: |
          if [ -f .env ]; then
            echo "❌ .env file is committed!"
            exit 1
          fi
          echo "✅ No .env file in repo"

      - name: Check .gitignore covers sensitive files
        run: |
          grep -q ".env" .gitignore && echo "✅ .env in .gitignore" || (echo "❌ .env not in .gitignore" && exit 1)
          grep -q "*.db" .gitignore && echo "✅ *.db in .gitignore" || (echo "❌ *.db not in .gitignore" && exit 1)
          grep -q "__pycache__" .gitignore && echo "✅ __pycache__ in .gitignore" || (echo "❌ __pycache__ not in .gitignore" && exit 1)